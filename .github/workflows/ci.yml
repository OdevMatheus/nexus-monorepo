name: Nexum CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Backend CI (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Sobe a infra antes de rodar o back
      - name: Start Infrastructure (Docker)
        working-directory: ./docker
        run: docker compose up -d

      # Healthcheck
      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until docker exec $(docker ps -qf "name=nexum-db") pg_isready -U nexum_user -d nexum_db; do
            echo "PostgreSQL not ready yet, retrying..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Build and Test (Backend)
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      # limpeza
      - name: Stop Infrastructure
        if: always()
        working-directory: ./docker
        run: docker compose down

  frontend-build:
    name: Frontend CI (React + TS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type Check & Lint
        working-directory: ./frontend
        run: |
          npm run lint 
          npx tsc --noEmit

      - name: Build (Frontend)
        working-directory: ./frontend
        run: npm run build